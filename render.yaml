services:
  - type: web
    name: jobintel-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ConnectionStrings__DefaultConnection
        fromDatabase:
          name: jobintel-db
          property: connectionString
      - key: JwtSettings__SecretKey
        generateValue: true
      - key: EmailSettings__SenderPassword
        sync: false
      - key: GoogleOAuth__ClientId
        sync: false

databases:
  - name: jobintel-db
    plan: free
    databaseName: jobintel
